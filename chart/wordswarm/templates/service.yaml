apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "wordswarm.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.game.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "wordswarm.selectorLabels" . | nindent 4 }}
